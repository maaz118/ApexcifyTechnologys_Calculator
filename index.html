<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>APEXCIFY CALCULATOR</h1>
    <div class="calculator">
        <input type="text" id="display" disabled>

        <div class="button">
            <button onclick="appendno('0')">0</button>
            <button onclick="appendno('1')">1</button>
            <button onclick="appendno('2')">2</button>
            <button onclick="appendno('3')">3</button>
            <button onclick="appendno('4')">4</button>
            <button onclick="appendno('5')">5</button>
            <button onclick="appendno('6')">6</button>
            <button onclick="appendno('7')">7</button>
            <button onclick="appendno('8')">8</button>
            <button onclick="appendno('9')">9</button>
            <button onclick="appendno('.')">.</button>

            <button onclick="setOperator('+')">+</button>
            <button onclick="setOperator('-')">-</button>
            <button onclick="setOperator('*')">*</button>
            <button onclick="setOperator('/')">\</button>
            <button onclick="setOperator('%')">%</button>

            <button onclick="deletelast()">DEL</button>
            <button onclick="clearAll()">C</button>
            <button onclick="calculate()">=</button>
                      
        </div>
    </div>
    <script src="script.js"></script>

    
</body>
</html>
